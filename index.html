<head>
  <meta charset="utf-8">
  <title>Iván Roblero — Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio personal de Iván Roblero — Desarrollador de software">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #08070c; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #__bundler_loading { position: fixed; bottom: 20px; right: 20px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: transparent; z-index: 10000; }
    #__bundler_thumbnail { position: fixed; inset: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 32px; background: #08070c; z-index: 9999; transition: opacity 0.6s ease; }
    #__bundler_thumbnail svg { width: 100%; height: 100%; object-fit: contain; }
    #__bundler_placeholder { color: #999; font-size: 14px; }

    .orbit-loader { position: relative; width: 120px; height: 120px; }
    .orbit-loader .ring { position: absolute; inset: 0; border-radius: 50%; border: 1px solid transparent; }
    .orbit-loader .ring-1 { border-top-color: #ff8a4c; animation: orbit-spin 1.8s cubic-bezier(0.5,0,0.5,1) infinite; }
    .orbit-loader .ring-2 { inset: 12px; border-right-color: #a855f7; animation: orbit-spin 1.4s cubic-bezier(0.5,0,0.5,1) infinite reverse; }
    .orbit-loader .ring-3 { inset: 24px; border-bottom-color: rgba(255,138,76,0.5); animation: orbit-spin 2.2s cubic-bezier(0.5,0,0.5,1) infinite; }
    .orbit-loader .dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; }
    .orbit-loader .dot-1 { top: -4px; left: 50%; margin-left: -4px; background: #ff8a4c; box-shadow: 0 0 12px #ff8a4c, 0 0 24px rgba(255,138,76,0.4); animation: orbit-spin 1.8s cubic-bezier(0.5,0,0.5,1) infinite; transform-origin: 4px 64px; }
    .orbit-loader .dot-2 { top: 50%; right: -4px; margin-top: -4px; background: #a855f7; box-shadow: 0 0 12px #a855f7, 0 0 24px rgba(168,85,247,0.4); animation: orbit-spin 1.4s cubic-bezier(0.5,0,0.5,1) infinite reverse; transform-origin: -44px 4px; }
    .orbit-loader .dot-3 { bottom: -4px; left: 50%; margin-left: -4px; background: rgba(255,138,76,0.6); box-shadow: 0 0 8px rgba(255,138,76,0.3); animation: orbit-spin 2.2s cubic-bezier(0.5,0,0.5,1) infinite; transform-origin: 4px -32px; width: 6px; height: 6px; }
    .orbit-loader .center-glow { position: absolute; inset: 36px; border-radius: 50%; background: radial-gradient(circle, rgba(255,138,76,0.15) 0%, transparent 70%); animation: orbit-pulse 2.4s ease-in-out infinite; }
    @keyframes orbit-spin { to { transform: rotate(360deg); } }
    @keyframes orbit-pulse { 0%,100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }

    .loader-text { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: #7a7690; }
    .loader-text .loader-dots::after { content: ''; animation: loader-dots 1.5s steps(3) infinite; }
    @keyframes loader-dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }
    @keyframes sw-blink-green { 0%,100% { opacity:1; box-shadow:0 0 8px rgba(34,197,94,0.6); } 50% { opacity:0.3; box-shadow:0 0 2px rgba(34,197,94,0.2); } }
  </style>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

          '    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">',
          '      <span style="width:10px;height:10px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,0.6);animation:sw-blink-green 1.4s ease-in-out infinite;"></span>',
              '    </div>',
          '    <h3 style="font-family:\'Playfair Display\',serif;font-weight:700;font-size:clamp(28px,3.5vw,42px);line-height:1.1;margin:0 0 8px;color:#f5f2fa;">guatemala-mcp</h3>',
          '    <p style="font-family:\'JetBrains Mono\',monospace;font-size:12px;color:#7a7690;margin:0 0 20px;" class="cwo-type">Open Source · MCP Server</p>',
          '    <p style="margin:0 0 24px;font-size:15px;line-height:1.75;color:#b4b0c4;" class="cwo-desc">Un servidor MCP de código abierto que da a los asistentes de IA acceso nativo a datos públicos guatemaltecos: tipo de cambio oficial del Banguat, validación de NIT y CUI/DPI, y feriados nacionales. La capa de datos que permite a las herramientas de IA “entender” Guatemala.</p>',
          '    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;">',
          '      <span style="padding:6px 12px;border-radius:7px;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);font-family:\'JetBrains Mono\',monospace;font-size:12px;color:#cfcbdd;">TypeScript</span>',
          '      <span style="padding:6px 12px;border-radius:7px;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);font-family:\'JetBrains Mono\',monospace;font-size:12px;color:#cfcbdd;">MCP SDK</span>',
          '      <span style="padding:6px 12px;border-radius:7px;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);font-family:\'JetBrains Mono\',monospace;font-size:12px;color:#cfcbdd;">Node.js</span>',
          '      <span style="padding:6px 12px;border-radius:7px;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);font-family:\'JetBrains Mono\',monospace;font-size:12px;color:#cfcbdd;">Zod</span>',

          '    </div>',
          '  </div>',

          '    <pre style="margin:0;font-family:\'JetBrains Mono\',monospace;font-size:14px;line-height:1.85;color:#b4b0c4;"><span style="color:#7a7690;">// guatemala-mcp</span>\n<span style="color:#a855f7;">import</span> { <span style="color:#ff8a4c;">exchangeRate</span>,\n         <span style="color:#ff8a4c;">validateNIT</span>,\n         <span style="color:#ff8a4c;">holidays</span> } <span style="color:#a855f7;">from</span> <span style="color:#ff8a4c;">"guatemala-mcp"</span>\n\n<span style="color:#a855f7;">const</span> rate = <span style="color:#a855f7;">await</span> exchangeRate()\n<span style="color:#7a7690;">// { buy: 7.72, sell: 7.78 }</span></pre>',
